<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Text Saver</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: rgba(255, 255, 255, 0.88);
      --card-border: rgba(255, 255, 255, 0.7);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --success: #15803d;
      --error: #dc2626;
      --danger-bg: #fee2e2;
      --danger-text: #b91c1c;
      --danger-border: #fecaca;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.10);
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.10), transparent 28%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      padding: 32px 16px;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 32px 32px 20px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(255, 255, 255, 0.4));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.10);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .subtext {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 560px;
    }

    .content {
      padding: 28px 32px 32px;
    }

    .composer {
      display: grid;
      gap: 14px;
    }

    .label {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid #dbe3ee;
      border-radius: 18px;
      font: inherit;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: #ffffff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #94a3b8;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: linear-gradient(135deg, var(--primary), #3b82f6);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      min-height: 22px;
      font-size: 14px;
      font-weight: 600;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--error);
    }

    .status.info {
      color: var(--muted);
    }

    .list-section {
      margin-top: 30px;
      padding-top: 24px;
      border-top: 1px solid rgba(148, 163, 184, 0.16);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: #eaf1ff;
      color: var(--primary);
      font-size: 13px;
      font-weight: 800;
    }

    #messages {
      display: grid;
      gap: 14px;
    }

    .item {
      background: #ffffff;
      border: 1px solid #e5edf7;
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .item-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .message-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message-meta {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .delete-btn {
      flex-shrink: 0;
      background: var(--danger-bg);
      color: var(--danger-text);
      border: 1px solid var(--danger-border);
      box-shadow: none;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .delete-btn:hover {
      background: #fecaca;
    }

    .empty-state,
    .error-state {
      text-align: center;
      padding: 28px 20px;
      border-radius: 18px;
      border: 1px dashed #d7e0ec;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
    }

    .empty-state strong,
    .error-state strong {
      display: block;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 6px;
    }

    @media (max-width: 640px) {
      body {
        padding: 20px 12px;
      }

      .hero,
      .content {
        padding-left: 18px;
        padding-right: 18px;
      }

      .actions {
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      .delete-btn {
        width: auto;
      }

      .item-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="app-card">
      <div class="hero">
        <div class="eyebrow">Simple Web App</div>
        <h1>Simple Text Saver</h1>
        <p class="subtext">
          Write a message, save it online, and manage entries with soft delete.
        </p>
      </div>

      <div class="content">
        <div class="composer">
          <label class="label" for="user">Your name</label>
          <input id="user" type="text" placeholder="Enter your name" />

          <label class="label" for="content">Your message</label>
          <textarea id="content" placeholder="Type your message here..."></textarea>

          <div class="actions">
            <button id="saveBtn">Save Message</button>
            <div class="status info" id="status"></div>
          </div>
        </div>

        <div class="list-section">
          <div class="section-header">
            <h2>Saved Messages</h2>
            <div class="count-badge" id="messageCount">0</div>
          </div>
          <div id="messages"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const userEl = document.getElementById("user");
    const contentEl = document.getElementById("content");
    const saveBtn = document.getElementById("saveBtn");
    const statusEl = document.getElementById("status");
    const messagesEl = document.getElementById("messages");
    const messageCountEl = document.getElementById("messageCount");

    function setStatus(message, type = "info") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function getUserName() {
      const value = userEl.value.trim();
      return value ? value : "anonymous";
    }

    async function loadMessages() {
      try {
        const res = await fetch("/api/messages");
        const data = await res.json();

        messagesEl.innerHTML = "";
        messageCountEl.textContent = Array.isArray(data) ? data.length : 0;

        if (!Array.isArray(data) || !data.length) {
          messagesEl.innerHTML = `
            <div class="empty-state">
              <strong>No messages yet</strong>
              Your saved entries will appear here.
            </div>
          `;
          return;
        }

        data.forEach(item => {
          const div = document.createElement("div");
          div.className = "item";
          div.innerHTML = `
            <div class="item-top">
              <div class="message-text">${escapeHtml(item.content || "")}</div>
              <button class="delete-btn" data-id="${item.id}">Delete</button>
            </div>
            <div class="message-meta">
              <span>Created: ${new Date(item.created_at).toLocaleString()}</span>
              <span>By: ${escapeHtml(item.created_by || "anonymous")}</span>
            </div>
          `;
          messagesEl.appendChild(div);
        });

        document.querySelectorAll(".delete-btn").forEach(button => {
          button.addEventListener("click", async () => {
            const id = button.getAttribute("data-id");
            const confirmed = confirm("Are you sure you want to delete this message?");

            if (!confirmed) return;

            button.disabled = true;
            button.textContent = "Deleting...";

            try {
              const res = await fetch(`/api/messages/${id}`, {
                method: "DELETE",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  user: getUserName()
                })
              });

              const data = await res.json();

              if (!res.ok) {
                setStatus(data.error || "Failed to delete message.", "error");
                button.disabled = false;
                button.textContent = "Delete";
                return;
              }

              setStatus("Message deleted successfully.", "success");
              await loadMessages();
            } catch (err) {
              setStatus("Something went wrong while deleting.", "error");
              button.disabled = false;
              button.textContent = "Delete";
            }
          });
        });
      } catch (err) {
        messageCountEl.textContent = "0";
        messagesEl.innerHTML = `
          <div class="error-state">
            <strong>Unable to load messages</strong>
            Please refresh the page and try again.
          </div>
        `;
      }
    }

    saveBtn.addEventListener("click", async () => {
      const content = contentEl.value.trim();

      if (!content) {
        setStatus("Please enter some text first.", "error");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";
      setStatus("Saving your message...", "info");

      try {
        const res = await fetch("/api/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            content,
            user: getUserName()
          })
        });

        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || "Failed to save message.", "error");
          return;
        }

        setStatus("Saved successfully.", "success");
        contentEl.value = "";
        await loadMessages();
      } catch (err) {
        setStatus("Something went wrong. Please try again.", "error");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Save Message";
      }
    });

    loadMessages();
  </script>
</body>
</html>
